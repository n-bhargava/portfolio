<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA: restore path encoded by 404.html
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        var search = location.search;
        if (search) {
          var p = new URLSearchParams(search);
          var path = p.get('p');
          if (path) {
            var rest = p.get('q') ? '?' + p.get('q').replace(/~and~/g, '&') : '';
            history.replaceState(null, null, '/portfolio' + path + rest + location.hash);
          }
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naysa Bhargava</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Akshar:wght@700&family=Bricolage+Grotesque:opsz,wght@12..60,700&family=Finlandica:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
